<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Детская игра-пазл</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8tbtS7zP1onhMGCdVK+iQrJ7lzPJQdA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg: #f5f9ff;
      --card: #ffffff;
      --accent: #5d8bff;
      --accent-2: #ff8fab;
      --ok: #f6c945;
      --bad: #63c2a5;
      --text: #1f2b47;
      --shadow: 0 10px 25px rgba(31, 43, 71, 0.14);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #eaf2ff, #fef8ff 55%, #ffffff);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app {
      width: min(1200px, 95vw);
      margin: 18px auto 24px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(4px);
      border: 2px solid #fff;
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 8px 10px 14px;
      flex-wrap: wrap;
    }

    .title {
      font-size: clamp(1.1rem, 2.8vw, 1.55rem);
      font-weight: 800;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      background: var(--card);
      border-radius: 999px;
      padding: 10px 14px;
      border: 2px solid #edf2ff;
      font-weight: 700;
      min-width: 110px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(60, 84, 133, 0.12);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(250px, 330px) 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .pieces-panel, .board-panel {
      background: var(--card);
      border-radius: var(--radius);
      border: 2px solid #e7edff;
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    .pieces-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 10px;
      margin-top: 8px;
    }

    .piece-btn {
      border: 0;
      background: #f4f7ff;
      border-radius: 16px;
      min-height: 140px;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      box-shadow: 0 6px 14px rgba(81, 106, 163, 0.16);
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }

    .piece-btn:hover { transform: translateY(-3px); }

    .piece-btn.selected {
      outline: 3px solid var(--accent);
      outline-offset: 1px;
      background: #e7efff;
      transform: scale(1.02);
    }

    .piece-btn:disabled {
      cursor: default;
      opacity: .8;
    }

    .piece-btn canvas {
      width: min(92%, 150px);
      height: auto;
      pointer-events: none;
      transition: transform 0.6s cubic-bezier(.2,.65,.2,1);
      will-change: transform;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.2));
    }

    .board-panel {
      min-height: 500px;
      display: flex;
      flex-direction: column;
    }

    #boardCanvas {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background: linear-gradient(140deg, #f5f8ff, #fefbff);
      border: 2px dashed #d5def7;
      flex: 1;
    }

    .result-pop {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(.4);
      font-size: clamp(3rem, 8vw, 6rem);
      opacity: 0;
      pointer-events: none;
      z-index: 6;
    }

    .result-pop.show {
      animation: burst 1.1s ease forwards;
    }

    @keyframes burst {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.2) rotate(-20deg); }
      20% { opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1.15) rotate(12deg); }
      100% { opacity: 0; transform: translate(-50%, -54%) scale(1.05) rotate(0deg); }
    }

    .overlay-message {
      position: fixed;
      inset: 0;
      background: rgba(16, 25, 49, 0.55);
      display: grid;
      place-items: center;
      padding: 16px;
      z-index: 20;
    }

    .overlay-card {
      background: white;
      width: min(640px, 96vw);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .board-panel { min-height: 360px; }
      .pieces-grid { grid-template-columns: repeat(4, minmax(76px, 1fr)); }
      .piece-btn { min-height: 112px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hud">
      <div class="title"><i class="fa-solid fa-puzzle-piece"></i> Найди правильный пазл!</div>
      <div class="score">
        <div class="pill">⭐ Верно: <span id="okCount">0</span></div>
        <div class="pill">🩹 Ошибки: <span id="badCount">0</span></div>
        <div class="pill">Раунд: <span id="roundNow">0</span>/<span id="roundTotal">0</span></div>
      </div>
    </div>

    <div class="layout">
      <section class="pieces-panel">
        <strong>Выбери кусочек</strong>
        <div id="piecesGrid" class="pieces-grid"></div>
      </section>

      <section class="board-panel">
        <canvas id="boardCanvas" width="900" height="560"></canvas>
        <div id="resultPop" class="result-pop"></div>
      </section>
    </div>
  </div>

  <div id="overlay" class="overlay-message hidden">
    <div class="overlay-card" id="overlayCard"></div>
  </div>

  <script>
    // Глобальные настройки игры
    const SETTINGS = {
      rotationEnabled: true,
      rotationSpeed: 1.8,
      rotationInterval: 800,
      showDebugGrid: false,
      puzzleSize: 120,
      delayNext: 1500
    };

    const state = {
      imagePaths: [],
      imageCache: new Map(),
      currentIndex: 0,
      right: 0,
      wrong: 0,
      currentRound: null,
      locked: false,
      rotationTimers: []
    };

    const boardCanvas = document.getElementById('boardCanvas');
    const boardCtx = boardCanvas.getContext('2d');
    const piecesGrid = document.getElementById('piecesGrid');
    const resultPop = document.getElementById('resultPop');
    const okCount = document.getElementById('okCount');
    const badCount = document.getElementById('badCount');
    const roundNow = document.getElementById('roundNow');
    const roundTotal = document.getElementById('roundTotal');
    const overlay = document.getElementById('overlay');
    const overlayCard = document.getElementById('overlayCard');

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    // Загрузка списка изображений из манифеста + их предзагрузка в кэш
    async function loadImages() {
      let list;
      try {
        const response = await fetch('./img/list.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Не удалось прочитать img/list.json');
        list = await response.json();
      } catch (error) {
        showOverlay(
          `<h2>Не удалось загрузить изображения</h2>
           <p>Проверьте файл <code>img/list.json</code> и запустите игру из браузера, где разрешена загрузка локальных JSON.</p>
           <p><small>${error.message}</small></p>`
        );
        return;
      }

      const files = Array.isArray(list?.images) ? list.images : [];
      if (!files.length) {
        showOverlay('<h2>Папка img пуста</h2><p>Добавьте изображения и заполните <code>img/list.json</code>.</p>');
        return;
      }

      const loadTasks = files.map((name) => {
        const path = `./img/${name}`;
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            state.imageCache.set(path, img);
            resolve(path);
          };
          img.onerror = () => resolve(null);
          img.src = path;
        });
      });

      const loaded = (await Promise.all(loadTasks)).filter(Boolean);
      state.imagePaths = loaded;

      if (!state.imagePaths.length) {
        showOverlay('<h2>Не удалось загрузить ни одного изображения</h2><p>Проверьте форматы JPG/PNG в папке <code>img</code>.</p>');
        return;
      }

      roundTotal.textContent = state.imagePaths.length;
      overlay.classList.add('hidden');
      renderGame();
    }

    // Создаёт пазловый контур с выступами/впадинами
    function createJigsawPath(size, padding) {
      const x = padding;
      const y = padding;
      const t = size * 0.22;
      const neck = size * 0.12;
      const mid = size / 2;
      const dirs = [Math.random() > 0.5 ? 1 : -1, Math.random() > 0.5 ? 1 : -1, Math.random() > 0.5 ? 1 : -1, Math.random() > 0.5 ? 1 : -1];

      const p = new Path2D();
      p.moveTo(x, y);
      // top
      p.lineTo(x + mid - neck, y);
      p.bezierCurveTo(x + mid - neck, y - t * dirs[0], x + mid + neck, y - t * dirs[0], x + mid + neck, y);
      p.lineTo(x + size, y);
      // right
      p.lineTo(x + size, y + mid - neck);
      p.bezierCurveTo(x + size + t * dirs[1], y + mid - neck, x + size + t * dirs[1], y + mid + neck, x + size, y + mid + neck);
      p.lineTo(x + size, y + size);
      // bottom
      p.lineTo(x + mid + neck, y + size);
      p.bezierCurveTo(x + mid + neck, y + size + t * dirs[2], x + mid - neck, y + size + t * dirs[2], x + mid - neck, y + size);
      p.lineTo(x, y + size);
      // left
      p.lineTo(x, y + mid + neck);
      p.bezierCurveTo(x - t * dirs[3], y + mid + neck, x - t * dirs[3], y + mid - neck, x, y + mid - neck);
      p.closePath();

      return { path: p, tabSize: t };
    }

    // Генерация текущего раунда: дырка и 4 фрагмента
    function createPuzzle(image) {
      const viewW = boardCanvas.width;
      const viewH = boardCanvas.height;
      const size = SETTINGS.puzzleSize;

      const fit = Math.min(viewW / image.naturalWidth, viewH / image.naturalHeight);
      const drawW = image.naturalWidth * fit;
      const drawH = image.naturalHeight * fit;
      const dx = (viewW - drawW) / 2;
      const dy = (viewH - drawH) / 2;

      const holeX = randomBetween(dx + size * 0.5, dx + drawW - size * 1.5);
      const holeY = randomBetween(dy + size * 0.5, dy + drawH - size * 1.5);

      const padding = Math.round(size * 0.28);
      const shape = createJigsawPath(size, padding);
      const fragmentSize = size + padding * 2;

      const fragments = [];
      const correctId = Math.floor(Math.random() * 4);

      for (let i = 0; i < 4; i++) {
        let sx;
        let sy;

        if (i === correctId) {
          sx = holeX;
          sy = holeY;
        } else {
          sx = randomBetween(dx + size * 0.2, dx + drawW - size * 1.2);
          sy = randomBetween(dy + size * 0.2, dy + drawH - size * 1.2);
        }

        fragments.push({ id: i, sx, sy, isCorrect: i === correctId, fragmentSize, padding, path: shape.path, tabSize: shape.tabSize });
      }

      return {
        image,
        drawRect: { dx, dy, drawW, drawH },
        hole: { x: holeX, y: holeY, size, path: shape.path, padding, tabSize: shape.tabSize },
        fragments,
        correctId
      };
    }

    function drawBoard(round) {
      boardCtx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
      const { dx, dy, drawW, drawH } = round.drawRect;
      boardCtx.drawImage(round.image, dx, dy, drawW, drawH);

      // Вырезаем дырку в изображении
      boardCtx.save();
      boardCtx.translate(round.hole.x - round.hole.padding, round.hole.y - round.hole.padding);
      boardCtx.globalCompositeOperation = 'destination-out';
      boardCtx.fillStyle = 'rgba(0,0,0,1)';
      boardCtx.fill(round.hole.path);
      boardCtx.restore();

      // Обводка контура дырки
      boardCtx.save();
      boardCtx.translate(round.hole.x - round.hole.padding, round.hole.y - round.hole.padding);
      boardCtx.strokeStyle = '#ffffff';
      boardCtx.lineWidth = 3;
      boardCtx.setLineDash([8, 6]);
      boardCtx.stroke(round.hole.path);
      boardCtx.restore();

      if (SETTINGS.showDebugGrid) {
        boardCtx.save();
        boardCtx.strokeStyle = 'rgba(55,93,180,.32)';
        boardCtx.lineWidth = 1;
        const step = 40;
        for (let x = 0; x < boardCanvas.width; x += step) {
          boardCtx.beginPath();
          boardCtx.moveTo(x, 0);
          boardCtx.lineTo(x, boardCanvas.height);
          boardCtx.stroke();
        }
        for (let y = 0; y < boardCanvas.height; y += step) {
          boardCtx.beginPath();
          boardCtx.moveTo(0, y);
          boardCtx.lineTo(boardCanvas.width, y);
          boardCtx.stroke();
        }
        boardCtx.restore();
      }
    }

    function drawPieceCanvas(round, fragment) {
      const c = document.createElement('canvas');
      c.width = fragment.fragmentSize;
      c.height = fragment.fragmentSize;
      const ctx = c.getContext('2d');
      ctx.clearRect(0, 0, c.width, c.height);

      ctx.save();
      ctx.clip(fragment.path);
      const srcX = fragment.sx - fragment.padding;
      const srcY = fragment.sy - fragment.padding;
      ctx.drawImage(boardCanvas, -srcX, -srcY);
      ctx.restore();

      ctx.strokeStyle = 'rgba(255,255,255,.95)';
      ctx.lineWidth = 3;
      ctx.stroke(fragment.path);

      ctx.strokeStyle = 'rgba(31,43,71,.25)';
      ctx.lineWidth = 1;
      ctx.stroke(fragment.path);

      return c;
    }

    function clearRotations() {
      state.rotationTimers.forEach(clearInterval);
      state.rotationTimers = [];
    }

    // Постоянная ротация пазлов
    function animateRotation() {
      clearRotations();
      if (!SETTINGS.rotationEnabled) return;

      const canvases = Array.from(piecesGrid.querySelectorAll('.piece-btn canvas'));
      canvases.forEach((canvas) => {
        let angle = randomBetween(-60, 60);
        canvas.style.transform = `rotate(${angle}deg)`;

        const tick = () => {
          const turns = randomBetween(1.5, 2.5) * SETTINGS.rotationSpeed;
          const direction = Math.random() > 0.5 ? 1 : -1;
          angle += turns * 360 * direction;
          canvas.style.transitionDuration = `${randomBetween(0.22, 0.48) / SETTINGS.rotationSpeed}s`;
          canvas.style.transform = `rotate(${angle}deg)`;
        };

        tick();
        const timer = setInterval(tick, SETTINGS.rotationInterval + randomBetween(-170, 220));
        state.rotationTimers.push(timer);
      });
    }

    // Рендер интерфейса раунда
    function renderGame() {
      state.locked = false;
      clearRotations();

      const path = state.imagePaths[state.currentIndex];
      const image = state.imageCache.get(path);
      if (!image) {
        nextRound();
        return;
      }

      const round = createPuzzle(image);
      state.currentRound = round;
      drawBoard(round);

      piecesGrid.innerHTML = '';
      round.fragments.forEach((fragment) => {
        const btn = document.createElement('button');
        btn.className = 'piece-btn';
        btn.dataset.id = String(fragment.id);

        const pieceCanvas = drawPieceCanvas(round, fragment);
        btn.appendChild(pieceCanvas);
        btn.addEventListener('click', () => handleChoice(fragment.id, btn));
        piecesGrid.appendChild(btn);
      });

      roundNow.textContent = String(state.currentIndex + 1);
      okCount.textContent = String(state.right);
      badCount.textContent = String(state.wrong);

      animateRotation();
    }

    function showResult(iconClass, color) {
      resultPop.innerHTML = `<i class="${iconClass}"></i>`;
      resultPop.style.color = color;
      resultPop.classList.remove('show');
      void resultPop.offsetWidth;
      resultPop.classList.add('show');
    }

    // Обработка выбора пазла
    function handleChoice(id, buttonEl) {
      if (state.locked || !state.currentRound) return;
      state.locked = true;

      Array.from(piecesGrid.children).forEach((node) => node.setAttribute('disabled', 'true'));
      buttonEl.classList.add('selected');

      const hit = id === state.currentRound.correctId;
      if (hit) {
        state.right += 1;
        showResult('fa-solid fa-star', 'var(--ok)');
      } else {
        state.wrong += 1;
        showResult('fa-solid fa-bandage', 'var(--bad)');
      }

      okCount.textContent = String(state.right);
      badCount.textContent = String(state.wrong);

      setTimeout(nextRound, SETTINGS.delayNext);
    }

    // Переход к следующему раунду / финальному экрану
    function nextRound() {
      clearRotations();
      state.currentIndex += 1;

      if (state.currentIndex >= state.imagePaths.length) {
        finishGame();
        return;
      }

      renderGame();
    }

    function showOverlay(html) {
      overlayCard.innerHTML = html;
      overlay.classList.remove('hidden');
    }

    function finishGame() {
      boardCtx.clearRect(0, 0, boardCanvas.width, boardCanvas.height);
      piecesGrid.innerHTML = '';
      showOverlay(
        `<h2>Игра окончена 🎉</h2>
         <p style="font-size:1.2rem;">⭐ Правильных ответов: <b>${state.right}</b></p>
         <p style="font-size:1.2rem;">🩹 Ошибок: <b>${state.wrong}</b></p>
         <button id="restartBtn" style="margin-top:14px;padding:12px 18px;border-radius:14px;border:none;background:#5d8bff;color:#fff;font-weight:800;cursor:pointer;">Играть снова</button>`
      );
      const restart = document.getElementById('restartBtn');
      if (restart) {
        restart.addEventListener('click', () => {
          state.currentIndex = 0;
          state.right = 0;
          state.wrong = 0;
          overlay.classList.add('hidden');
          renderGame();
        }, { once: true });
      }
    }

    window.addEventListener('resize', () => {
      if (!state.currentRound || state.locked) return;
      // Перерисовка только текущего раунда для стабильного отображения
      drawBoard(state.currentRound);
    });

    loadImages();
  </script>
</body>
</html>
